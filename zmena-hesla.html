<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<title>Změna hesla · Statistiky Váš praktik</title>
<style>
/* ===== Váš praktik – světlé téma =====
   Všechny barvy jsou zde v proměnných. Pro doladění na přesné firemní odstíny
   stačí změnit --vp a --vp-dark (primární červená) a případně --amber. */
:root{
  --vp:#C8102E;            /* primární červená Váš praktik (tlačítka, akcenty, grafy hodin) */
  --vp-dark:#9C0A22;
  --vp-soft:#FBEAEC;       /* světle červené pozadí čipů a zvýraznění */
  --amber:#8F6400;         /* finanční akcent – text (kontrastní) */
  --amber-fill:#ECB23B;    /* finanční akcent – výplně grafů */
  --amber-soft:#FCF3DC;
  --ink:#16242E;           /* hlavní text */
  --mut:#506171;           /* sekundární text */
  --bg:#F2F6F8;            /* pozadí stránky */
  --card:#FFFFFF;
  --line:#DCE5EB;
  --line-soft:#EBF1F5;
  --chip:#F5F8FA;
  --danger:#B3261E;
  --approx:#C2CFD9;        /* sloupce s aproximovanou sazbou */
  --shadow:0 1px 2px rgba(16,42,60,.05), 0 6px 20px rgba(16,42,60,.07);
  --r:14px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font:15px/1.55 'Inter',-apple-system,'Segoe UI',Roboto,system-ui,sans-serif;
}
.wrap{max-width:1180px;margin:0 auto;padding:18px 20px 56px}
h1{font-size:21px;margin:0;font-weight:700;letter-spacing:-.01em}
h2{font-size:18px;margin:0 0 4px;font-weight:700;letter-spacing:-.01em}
h3{font-size:15px;margin:0 0 2px;font-weight:700}
a{color:var(--vp)}
.sub{color:var(--mut);font-size:13.5px;margin:2px 0 0}
.hint{color:var(--mut);font-size:12.5px;margin:10px 0 0}
.note{color:var(--mut);font-size:12.5px}
.mutd{color:var(--mut)}
.num,.n{font-variant-numeric:tabular-nums}
.hr{border:0;border-top:1px solid var(--line);margin:18px 0}

/* hlavička */
header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 16px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.mark{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--vp);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.mark svg{display:block}
.brand .bt{min-width:0}
.brand .bt .logo{display:block;font-weight:800;font-size:15px;color:var(--vp-dark);letter-spacing:.01em;line-height:1.1}
.brand .bt h1{line-height:1.2}
.topdate{color:var(--mut);font-size:13px;white-space:nowrap}

/* karty */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px;margin:0 0 16px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.right{margin-left:auto}

/* formulářové prvky */
input[type=text],input[type=password],input[type=month]{
  font:16px/1.3 inherit; color:var(--ink); background:#fff;
  border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; min-height:44px;
}
input:focus{outline:none;border-color:var(--vp);box-shadow:0 0 0 3px var(--vp-soft)}
select{font:14px inherit;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:7px 8px;min-height:38px}
select:focus{outline:none;border-color:var(--vp)}
.btn{
  font:600 14px/1 inherit; color:#fff; background:var(--vp);
  border:1.5px solid var(--vp); border-radius:10px; padding:0 16px; min-height:44px;
  cursor:pointer; display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.btn:hover{background:var(--vp-dark);border-color:var(--vp-dark)}
.btn.ghost{background:#fff;color:var(--vp-dark);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--vp);background:var(--vp-soft)}
.pill{display:inline-block;background:var(--chip);border:1px solid var(--line);color:var(--mut);font-size:12px;border-radius:99px;padding:3px 10px;white-space:nowrap}
.badge{display:inline-block;background:var(--vp-soft);color:var(--vp-dark);font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px}

/* vyhledávání lékaře */
.searchbox{position:relative;max-width:460px;margin-top:10px}
.searchbox input{width:100%}
.suggest{
  position:absolute;z-index:30;top:calc(100% + 6px);left:0;right:0;display:none;
  background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
  max-height:330px;overflow:auto;padding:5px;
}
.suggest button{
  display:flex;flex-direction:column;gap:1px;width:100%;text-align:left;background:none;border:0;
  font:inherit;color:var(--ink);padding:9px 11px;border-radius:9px;cursor:pointer;
}
.suggest button .meta{font-size:12px;color:var(--mut)}
.suggest button:hover,.suggest button.act{background:var(--vp-soft)}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin:14px 0 4px}
.kpi{background:var(--chip);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.kpi b{display:block;font-size:21px;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.kpi span{display:block;color:var(--mut);font-size:12px;margin-top:2px;line-height:1.35}
.kpi.gold b{color:var(--amber)}

/* přepínač stáží */
.sw{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:13px;cursor:pointer;flex-wrap:wrap}
.sw input{width:17px;height:17px;accent-color:var(--vp)}

/* týdenní pásy */
.weeks{display:flex;flex-direction:column;gap:14px;margin-top:14px}
.week{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.wh{display:flex;justify-content:space-between;gap:10px;align-items:baseline;background:var(--chip);border-bottom:1px solid var(--line);padding:9px 13px;font-size:13px;flex-wrap:wrap}
.wh b{font-size:13.5px}
.wh span{color:var(--mut)}
.days{display:grid;grid-template-columns:repeat(7,1fr)}
.day{border-left:1px solid var(--line-soft);padding:9px 10px;min-height:96px}
.day:first-child{border-left:0}
.day.today{background:var(--vp-soft)}
.dl{font-size:12px;color:var(--mut);font-weight:600;margin-bottom:6px;white-space:nowrap}
.tag-today{background:var(--vp);color:#fff;border-radius:6px;font-size:10px;padding:1.5px 6px;font-weight:700;vertical-align:1px}
.day .none{color:#9FB0BD;font-size:13px}
.shift{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 9px;margin:0 0 6px;box-shadow:0 1px 2px rgba(16,42,60,.04)}
.shift .cl{font-weight:700;font-size:12.5px;line-height:1.3}
.shift .tm{font-size:12.5px;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:1px}
.shift .note{margin-top:2px;font-size:11.5px}
.shift.staz{background:var(--chip);border-style:dashed}
.shift.staz .cl{color:var(--mut);font-weight:600}
.track{height:5px;background:var(--line-soft);border-radius:99px;position:relative;margin-top:6px}
.track i{position:absolute;top:0;bottom:0;background:var(--vp);border-radius:99px}

/* seznam dalších služeb */
.glist{margin-top:6px}
.gweek{font-size:12px;font-weight:700;color:var(--vp-dark);background:var(--vp-soft);display:inline-block;border-radius:7px;padding:3px 9px;margin:14px 0 4px}
.glist .badge{vertical-align:1px}

/* tabulky */
.tablebox{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:11px;background:#fff}
table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:430px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);text-align:left;font-weight:700;padding:9px 12px;border-bottom:1.5px solid var(--line);background:var(--chip);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tfoot td{border-top:1.5px solid var(--line);font-weight:700;background:var(--chip)}
th.n,td.n{text-align:right}
th.sort{cursor:pointer;user-select:none}
th.sort:hover{color:var(--ink)}
th.sort.on{color:var(--vp-dark)}
th.sort.on::after{content:' ↓';font-size:10px}
th.sort.on.asc::after{content:' ↑'}
.bar{height:9px;background:var(--vp);border-radius:99px;min-width:2px;opacity:.85}

/* admin */
.adm-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 12px;flex-wrap:wrap}
.warnbar{background:var(--amber-soft);border:1px solid #E8D5A6;color:#6B4E00;border-radius:11px;padding:10px 14px;font-size:13px;margin:0 0 14px;line-height:1.5}
.tabs{display:flex;gap:7px;margin:0 0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tabs button{
  font:600 13.5px inherit;color:var(--mut);background:#fff;border:1.5px solid var(--line);
  border-radius:99px;padding:0 15px;min-height:40px;cursor:pointer;white-space:nowrap;flex:0 0 auto;
}
.tabs button:hover{color:var(--vp-dark);border-color:var(--vp)}
.tabs button.on{background:var(--vp);border-color:var(--vp);color:#fff}
.pane{display:none}
.pane.on{display:block}
.charts{display:flex;flex-direction:column;gap:22px}
.chartbox{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:8px}
.chartbox svg{display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--mut);font-size:12px;margin-top:6px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}

/* tooltip */
.tip{position:fixed;z-index:99;display:none;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);color:var(--ink);border-radius:10px;padding:8px 11px;font-size:12.5px;pointer-events:none;max-width:240px}

/* patička + brána */
footer{color:var(--mut);font-size:12.5px;margin-top:26px;display:flex;flex-direction:column;gap:14px}
.gate{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.gate input{max-width:240px}
.err{color:var(--danger);font-size:13px;font-weight:600}
.shake{animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* zamykací obrazovka (statistiky) */
.lockwrap{min-height:92vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lock{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px 28px;max-width:400px;width:100%;text-align:center}
.lock .mark{margin:0 auto 14px;width:46px;height:46px;border-radius:13px}
.lock h1{font-size:19px}
.lock p{color:var(--mut);font-size:13.5px;margin:6px 0 16px}
.lock input{width:100%;text-align:center}
.lock .btn{width:100%;margin-top:10px}
.lock .err{display:block;min-height:18px;margin-top:8px}
.lock .foot{color:var(--mut);font-size:11.5px;margin-top:14px;line-height:1.5}

/* mobil */
@media (max-width:780px){
  .wrap{padding:12px 12px 44px}
  h1{font-size:18px}
  .topdate{display:none}
  .card{padding:14px;border-radius:12px}
  .kpis{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi b{font-size:18px}
  .days{grid-template-columns:1fr}
  .day{border-left:0;border-top:1px solid var(--line-soft);min-height:0;padding:8px 12px}
  .day:first-child{border-top:0}
  .day .none{font-size:12.5px}
  .dl{margin-bottom:4px}
  table{font-size:13px}
  th,td{padding:7px 9px}
  .adm-head .row{width:100%}
}

/* dohled */
.shift.doh{border-left:3px solid var(--vp)}
.badge.doh{background:var(--vp);color:#fff}

/* přepínač měsíce/týdny */
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:99px;overflow:hidden;background:#fff}
.seg button{font:600 13px inherit;color:var(--mut);background:none;border:0;padding:0 14px;min-height:38px;cursor:pointer;white-space:nowrap}
.seg button.on{background:var(--vp);color:#fff}
.seg button:not(.on):hover{color:var(--vp-dark)}
.nbadge{display:inline-block;min-width:16px;padding:0 6px;border-radius:99px;background:var(--vp,#C8102E);color:#fff;font-size:11px;font-weight:700;line-height:17px;text-align:center;vertical-align:middle}
#pane-kontrola h3{margin:0 0 4px}
#pane-kontrola table td,#pane-kontrola table th{vertical-align:middle}

</style>
</head>
<body>
<div class="lockwrap">
  <div class="lock" style="max-width:440px;text-align:left">
    <div class="mark"><svg width="24" height="24" viewBox="0 0 20 20"><path d="M8 2h4v6h6v4h-6v6H8v-6H2V8h6z" fill="#fff"/></svg></div>
    <h1>Změna hesla souboru</h1>
    <p>Funguje pro lékařský program i pro statistiky. Vyberte stažený soubor (<b>index.html</b> / <b>lekarsky-program.html</b> / <b>statistiky-programu.html</b>), zadejte staré a nové heslo. Nástroj soubor přešifruje a stáhne novou verzi – vše proběhne jen ve vašem prohlížeči, nic se nikam neodesílá.</p>
    <label class="sub" style="display:block;margin:10px 0 4px">Soubor</label>
    <input type="file" id="file" accept=".html,.htm" style="width:100%;font:14px inherit">
    <label class="sub" style="display:block;margin:14px 0 4px">Stávající heslo</label>
    <input type="password" id="oldPw" style="text-align:left" autocomplete="off">
    <label class="sub" style="display:block;margin:14px 0 4px">Nové heslo</label>
    <input type="password" id="newPw" style="text-align:left" autocomplete="off">
    <label class="sub" style="display:block;margin:14px 0 4px">Nové heslo znovu</label>
    <input type="password" id="newPw2" style="text-align:left" autocomplete="off">
    <button class="btn" id="go">Přešifrovat a stáhnout</button>
    <span class="err" id="err"></span>
    <div class="foot" id="ok"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const te = new TextEncoder(), tdc = new TextDecoder();
const b64d = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
const b64e = u8 => { let s=''; u8.forEach(b=>s+=String.fromCharCode(b)); return btoa(s); };
const ENC_RE = /(<script type="text\/plain" id="enc">)([A-Za-z0-9+/=\s]+)(<\/script>)/;

async function deriveKey(pw, salt, it, usage){
  const km = await crypto.subtle.importKey('raw', te.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:it, hash:'SHA-256'}, km,
    {name:'AES-GCM', length:256}, false, [usage]);
}

/* jádro: vezme HTML text, staré a nové heslo, vrátí přešifrovaný HTML text */
async function rekeyHtml(text, oldPw, newPw){
  const m = text.match(ENC_RE);
  if(!m) throw new Error('Soubor neobsahuje šifrovaný blok – je to opravdu soubor se statistikami?');
  const enc = JSON.parse(atob(m[2].trim()));
  const dKey = await deriveKey(oldPw, b64d(enc.s), enc.it, 'decrypt');
  let pt;
  try{
    pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(enc.iv)}, dKey, b64d(enc.ct));
  }catch(e){ throw new Error('Stávající heslo není správné.'); }
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const eKey = await deriveKey(newPw, salt, enc.it, 'encrypt');
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, eKey, pt);
  const blob = btoa(JSON.stringify({v:1, it:enc.it, s:b64e(salt), iv:b64e(iv), ct:b64e(new Uint8Array(ct))}));
  return text.replace(ENC_RE, (_, a, _b, c)=>a+blob+c);
}
window.rekeyHtml = rekeyHtml;

$('#go').addEventListener('click', async ()=>{
  const err=$('#err'), ok=$('#ok'), btn=$('#go');
  err.textContent=''; ok.textContent='';
  const f=$('#file').files[0];
  if(!f){ err.textContent='Vyberte soubor.'; return; }
  if(!$('#oldPw').value){ err.textContent='Zadejte stávající heslo.'; return; }
  if(!$('#newPw').value){ err.textContent='Zadejte nové heslo.'; return; }
  if($('#newPw').value!==$('#newPw2').value){ err.textContent='Nová hesla se neshodují.'; return; }
  if(!(window.crypto&&crypto.subtle)){ err.textContent='Tento prohlížeč nepodporuje šifrování.'; return; }
  btn.disabled=true; btn.textContent='Pracuji…';
  try{
    const text = await f.text();
    const out = await rekeyHtml(text, $('#oldPw').value, $('#newPw').value);
    const blob = new Blob([out], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = f.name;
    document.body.appendChild(a); a.click(); a.remove();
    ok.textContent = 'Hotovo. Stažený soubor nahraďte za původní – staré heslo přestává platit.';
  }catch(e){ err.textContent = e.message || 'Nepodařilo se přešifrovat.'; }
  btn.disabled=false; btn.textContent='Přešifrovat a stáhnout';
});
</script>
</body>
</html>
